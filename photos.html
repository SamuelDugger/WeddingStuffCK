  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <button class="lightbox-prev" id="lightboxPrev" aria-label="Previous">&#8249;</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="" />
    <button class="lightbox-next" id="lightboxNext" aria-label="Next">&#8250;</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="nav.js"></script>
  <script>
    // Lightbox for real images — click a photo to enlarge, then use the
    // arrows (or left/right keys) to step through the rest of the gallery.
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lightboxImg');
    const photos   = Array.from(document.querySelectorAll('.photo-tile img'));
    let currentIndex = 0;

    function showPhoto(index) {
      currentIndex = (index + photos.length) % photos.length;
      lbImg.src = photos[currentIndex].src;
      lbImg.alt = photos[currentIndex].alt;
    }

    photos.forEach((img, i) => {
      img.style.cursor = 'pointer';
      img.addEventListener('click', () => {
        showPhoto(i);
        lightbox.classList.add('active');
      });
    });

    document.getElementById('lightboxClose').addEventListener('click', () => lightbox.classList.remove('active'));
    document.getElementById('lightboxPrev').addEventListener('click', () => showPhoto(currentIndex - 1));
    document.getElementById('lightboxNext').addEventListener('click', () => showPhoto(currentIndex + 1));
    lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('active'); });
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') lightbox.classList.remove('active');
      if (e.key === 'ArrowLeft') showPhoto(currentIndex - 1);
      if (e.key === 'ArrowRight') showPhoto(currentIndex + 1);
    });
  </script>
