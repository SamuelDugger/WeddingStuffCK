<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photos | Cheyhoma &amp; Kody</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500&family=Parisienne&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .lightbox-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .lightbox-overlay.active { display: flex; }
    .lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
    }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 2rem;
      background: none; border: none;
      color: var(--white); font-size: 2rem;
      cursor: pointer; line-height: 1;
    }
  </style>
</head>
<body>
  <div class="page-wrap">

    <div class="page-hero">
      <span class="section-eyebrow">Cheyhoma &amp; Kody</span>
      <h1 class="page-hero-title">Photos</h1>
      <div class="ornament"><div class="ornament-diamond"></div></div>
    </div>

    <section class="content-section">
      <div class="wide">
        <div class="text-center mb-5">
          <span class="section-eyebrow">Engagement &amp; Memories</span>
          <h2 class="section-title">Our Gallery</h2>
        </div>

        <!-- Photo grid — replace photo-placeholder divs with <img> tags when you have photos -->
        <div class="photo-grid">
          <!-- Tile 1 - large feature -->
          <div class="photo-tile photo-tile-feature" style="grid-column: span 2; grid-row: span 2; aspect-ratio: auto;">
            <div class="photo-placeholder" style="height:460px;">C &amp; K</div>
          </div>
          <div class="photo-tile"><div class="photo-placeholder">♡</div></div>
          <div class="photo-tile"><div class="photo-placeholder">♡</div></div>
          <div class="photo-tile"><div class="photo-placeholder">♡</div></div>
          <div class="photo-tile"><div class="photo-placeholder">♡</div></div>
          <div class="photo-tile"><div class="photo-placeholder">♡</div></div>
          <div class="photo-tile"><div class="photo-placeholder">♡</div></div>
          <div class="photo-tile"><div class="photo-placeholder">♡</div></div>
          <div class="photo-tile"><div class="photo-placeholder">♡</div></div>
          <div class="photo-tile"><div class="photo-placeholder">♡</div></div>
        </div>

        <p class="text-center mt-5" style="font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);">
          More photos coming soon
        </p>
      </div>
    </section>

  </div>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="" />
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="nav.js"></script>
  <script>
    // Lightbox for real images
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lightboxImg');
    document.querySelectorAll('.photo-tile img').forEach(img => {
      img.style.cursor = 'pointer';
      img.addEventListener('click', () => {
        lbImg.src = img.src;
        lbImg.alt = img.alt;
        lightbox.classList.add('active');
      });
    });
    document.getElementById('lightboxClose').addEventListener('click', () => lightbox.classList.remove('active'));
    lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('active'); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('active'); });
  </script>
</body>
</html>
